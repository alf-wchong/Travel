<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"> <title id="title">Helsinki Airport Luggage Storage Decision Tree</title> <desc id="desc">A decision tree helping travelers choose between self-service lockers and staffed baggage storage at Helsinki Airport.</desc> <rect width="1200" height="760" fill="#f8fafc"/> <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937"> 🧳 Luggage Storage Decision Tree </text> <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4b5563"> Use this when you are too tired to think. </text> <g font-family="Arial, sans-serif" fill="#111827"> <rect x="400" y="140" width="400" height="76" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/> <text x="600" y="173" text-anchor="middle" font-size="22" font-weight="700">Do you have luggage?</text> <text x="600" y="199" text-anchor="middle" font-size="18">🎒 🧳 🎿 🚲</text> <line x1="600" y1="216" x2="360" y2="290" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/> <line x1="600" y1="216" x2="840" y2="290" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/> <rect x="130" y="290" width="460" height="78" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/> <text x="360" y="323" text-anchor="middle" font-size="22" font-weight="700">Small / normal bags?</text> <text x="360" y="349" text-anchor="middle" font-size="18">Backpack, cabin bag, normal suitcase</text> <rect x="610" y="290" width="460" height="78" rx="20" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/> <text x="840" y="323" text-anchor="middle" font-size="22" font-weight="700">Oversized / awkward?</text> <text x="840" y="349" text-anchor="middle" font-size="18">Skis, bike, stroller, huge suitcase</text> <line x1="360" y1="368" x2="360" y2="455" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/> <line x1="840" y1="368" x2="840" y2="455" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/> <rect x="130" y="455" width="460" height="110" rx="22" fill="#ecfdf5" stroke="#059669" stroke-width="3"/> <text x="360" y="495" text-anchor="middle" font-size="26" font-weight="700">✅ Use Lockers</text> <text x="360" y="528" text-anchor="middle" font-size="18">Fast, self-service, good for most travelers</text> <rect x="610" y="455" width="460" height="110" rx="22" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/> <text x="840" y="495" text-anchor="middle" font-size="26" font-weight="700">✅ Use Staffed Storage</text> <text x="840" y="528" text-anchor="middle" font-size="18">Best for large, fragile, or odd-shaped items</text> <rect x="220" y="625" width="760" height="70" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="3"/> <text x="600" y="655" text-anchor="middle" font-size="22" font-weight="700">⚠️ Keep passport, wallet, phone, meds, and boarding pass with you.</text> <text x="600" y="681" text-anchor="middle" font-size="18">Do not store trip-critical items.</text> </g> <defs> <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"> <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/> </marker> </defs> </svg>
