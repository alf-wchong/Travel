<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900"> <rect width="1200" height="900" fill="#f7fafc"/> <text x="600" y="55" font-size="34" font-family="Arial" text-anchor="middle" font-weight="bold"> 🚶 Helsinki 5-Hour Walking Loop </text> <text x="600" y="90" font-size="18" font-family="Arial" text-anchor="middle"> Perfect for a 10-hour layover </text> <line x1="600" y1="140" x2="600" y2="760" stroke="#60a5fa" stroke-width="8"/> <circle cx="600" cy="170" r="18" fill="#2563eb"/> <text x="640" y="178" font-size="22" font-family="Arial">🚉 Helsinki Central Station</text> <circle cx="600" cy="280" r="18" fill="#16a34a"/> <text x="640" y="288" font-size="22">⛪ Helsinki Cathedral</text> <circle cx="600" cy="390" r="18" fill="#f59e0b"/> <text x="640" y="398" font-size="22">🛍️ Senate Square</text> <circle cx="600" cy="500" r="18" fill="#ec4899"/> <text x="640" y="508" font-size="22">🐟 Market Square</text> <circle cx="600" cy="610" r="18" fill="#10b981"/> <text x="640" y="618" font-size="22">☕ Coffee Break</text> <circle cx="600" cy="720" r="18" fill="#7c3aed"/> <text x="640" y="728" font-size="22">🚆 Return to Central Station</text> <text x="120" y="825" font-size="22" font-family="Arial"> Total walking: ~4 km • Relaxed pace • Plenty of time for lunch </text> </svg>
